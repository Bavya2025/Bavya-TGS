services:
  db:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build: ./backend
    restart: always
    command: web
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    ports:
      - "8001:8000"
    deploy:
      resources:
        limits:
          memory: 512M

  scheduler:
    build: ./backend
    restart: always
    command: scheduler
    depends_on:
      - db
      - backend
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    build: "./TGS FRONTEND"
    restart: always
    ports:
      - "6785:80"
    depends_on:
      - backend

volumes:
  mysql_data:
