name: mobile
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  device_info_plus: ^10.1.0
  http: ^1.1.0
  google_fonts: ^6.1.0
  video_player: ^2.7.0
  image_picker: ^0.8.7+5
  intl: ^0.18.1
  camera: ^0.11.0
  path_provider: ^2.1.1
  path: ^1.8.3
  geolocator: ^10.1.1
  geocoding: ^3.0.0
  image: ^4.1.3
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^4.1.0
  file_picker: ^8.0.0
  url_launcher: ^6.2.1
  open_filex: ^4.3.4
  flutter_background_service: ^5.0.0
  flutter_background_service_android: ^6.1.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  permission_handler: ^11.3.1
  package_info_plus: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/background.mp4
    - assets/splash_video.mp4
    - assets/bavya logo.png
