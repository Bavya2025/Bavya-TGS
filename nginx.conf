# Nginx Configuration for 3 DISTINCT Applications (Windows)
# Supports TGS, Finance, and HR apps with automatic routing

worker_processes  1;

events {
    worker_connections 1024;
}

http {
    # Fix: Use absolute path for mime.types
    include       "E:/TGS-V1.1/tools/nginx/conf/mime.types";
    default_type  application/octet-stream;
    
    sendfile      on;
    keepalive_timeout  65;

    # --- APP 1: TGS (E:\TGS-V1.1) ---
    upstream tgs_cluster_1 {
        ip_hash;
        server 127.0.0.1:4567;
        server 127.0.0.1:4568;
    }

    # --- APP 2: Finance ---
    upstream tgs_cluster_2 {
        server 127.0.0.1:4570;
    }

    # --- APP 3: HR ---
    upstream tgs_cluster_3 {
        server 127.0.0.1:4573;
    }

    # --- SERVER: TGS (Port 6785) ---
    server {
        listen 6785;
        server_name localhost;
        
        # Path to TGS Frontend dist
        location / {
            root "E:/TGS-V1.1/TGS_FRONTEND/dist";
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://tgs_cluster_1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # --- SERVER: Finance (Port 6786) ---
    server {
        listen 6786;
        server_name localhost;

        location / {
            root "C:/Apps/Finance/frontend/dist";
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://tgs_cluster_2;
            proxy_set_header Host $host;
        }
    }

    # --- SERVER: HR (Port 6787) ---
    server {
        listen 6787;
        server_name localhost;

        location / {
            root "C:/Apps/HR/frontend/dist";
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://tgs_cluster_3;
            proxy_set_header Host $host;
        }
    }
}
