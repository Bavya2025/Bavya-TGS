# Nginx Configuration for 3 DISTINCT Applications (Windows)
# Supports TGS, Finance, and HR apps with automatic routing

worker_processes  1;

events {
    worker_connections 1024;
}

http {
    # Use relative path from prefix (.) for mime.types
    include       tools/nginx/conf/mime.types;
    default_type  application/octet-stream;
    
    sendfile      on;
    keepalive_timeout  65;

    # --- UNIFIED TGS CLUSTER: All available workers across replicated instances ---
    upstream tgs_high_availability {
        ip_hash;
        server 127.0.0.1:4567;
        server 127.0.0.1:4568;
        server 127.0.0.1:4570;
        server 127.0.0.1:4573;
    }

    # --- SERVER 1: TGS Primary (Port 6785) ---
    server {
        listen 6785;
        server_name localhost;
        
        location / {
            root "./TGS FRONTEND/dist";
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://tgs_high_availability;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # --- SERVER 2: TGS Replica 1 (Port 6786) ---
    server {
        listen 6786;
        server_name localhost;

        location / {
            root "./TGS FRONTEND/dist";
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://tgs_high_availability;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # --- SERVER 3: TGS Replica 2 (Port 6787) ---
    server {
        listen 6787;
        server_name localhost;

        location / {
            root "./TGS FRONTEND/dist";
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://tgs_high_availability;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
